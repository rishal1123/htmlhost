services:
  htmlhost:
    build: .
    image: htmlhost:latest
    container_name: htmlhost
    network_mode: host
    ports:
      - "5004:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./users.json:/app/users.json
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-changeme}
    restart: unless-stopped
